services:

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/palha.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Defina JWT_SECRET_KEY no arquivo .env}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-palha@2025}
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://127.0.0.1"
    volumes:
      - palha_data:/data
    networks:
      - palha_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend (React + nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - palha_net

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  palha_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  palha_net:
    driver: bridge
